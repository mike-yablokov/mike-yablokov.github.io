- id: kejs-3-2
  title: "Визит-центр заповедника «Пасвик»: ESG-партнёрство, которое меняет отношение к природе"
  image: "/assets/images/cases/ymike.ru_c_3.2-1200w.webp"
  sections:
    - type: challenge
      title: "Вызов"
      content: "Заповедник «Пасвик», расположенный в приграничной зоне на Кольском полуострове, долгое время не имел «лица» — современной площадки для диалога. Нельзя было пригласить партнёров, провести событие для местных жителей Никеля или качественно принять туристов. Отсутствовало пространство, чтобы рассказывать о сложной работе по сохранению природы в условиях соседства с крупным производством. Это ограничивало влияние заповедника и не позволяло выстроить открытый диалог со всеми стейкхолдерами территории."
    - type: solution
      title: "Решение"
      content: "Была разработана концепция визит-центра, которая с самого начала рассматривалась как проект стратегического партнёрства. Ключевым соразработчиком и инвестором выступила крупная ресурсодобывающая компания, для которой это стало частью комплексной ESG-стратегии. Ядром концепции стал баланс: показать хрупкую природу Заполярья, работу заповедника (включая совместные с бизнесом научные программы мониторинга) и рассказать о приграничном сотрудничестве. Центр спроектирован как многофункциональное пространство: от эмоциональной экспозиции до экокласса для работы с местными школьниками."
    - type: result
      title: "Результат"
      content: "Появилась не просто точка на карте, а действенным инструментом трансформации территориальных отношений: Для заповедника: Появилась современная «визитная карточка», которая повышает узнаваемость и авторитет организации. Центр позволяет эффективно доносить миссию заповедника, формировать общественную поддержку и вовлекать местное сообщество в природоохранные инициативы. Для бизнеса: Проект стал конкретным подтверждением социальной ответственности компании. Это улучшило репутацию бизнеса в моногороде, снизило социальные риски и укрепило «социальную лицензию» на деятельность — критически важный фактор для добывающих компаний в сложных регионах. Для города: Создана общая ценность: жители получили современное образовательное и культурное пространство, власть — успешный пример частно-государственного партнерства для тиражирования в других районах, туристы — качественную точку притяжения, дополняющую туристический маршрут региона."
    - type: appeal
      title: "Обращение к ЦА"
      content: "Этот кейс предлагает готовую модель для компаний, стремящихся к устойчивому развитию. Для бизнеса с ESG-повесткой — это возможность превратить экологические инвестиции в конкретные преимущества: снижение социальных рисков, улучшение репутации и долгосрочную стабильность операций. Для региональных администраций и природоохранных учреждений — решение как при ограниченном бюджете создать эффективную инфраструктуру через партнерство с бизнесом. Проект демонстрирует, что экология и экономика не конфликтуют — при правильном подходе они создают синергию для развития всей территории."
    - type: additional
      title: "Дополнительно"
      links:
