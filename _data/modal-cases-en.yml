- id: kejs-4-1
  title: "From Satellite to Route: How Spatial Analysis Increased Field Research Effectiveness Several Times"
  image: "/assets/images/cases/ymike.ru_c_4.1-1200w.webp"
  sections:
    - type: challenge
      title: "Challenge"
      content: "Planning comprehensive ornithofauna inventory in the large federal \"Remdovsky\" reserve faced a classic problem: how to cover maximum diverse habitats with minimal resources? Without detailed territory analysis, routes were built intuitively, leading to data gaps, underestimation of rare species, and irrational time and fuel costs. A scientifically-based plan was needed, ensuring result representativeness with minimal expenses."
    - type: solution
      title: "Solution"
      content: "We applied a universal methodological approach integrating GIS and satellite data. Based on Sentinel-2 images, a detailed map of 9 habitat types was created, their area and fragmentation degree calculated. Using this data and Python scripts, we moved from abstract \"survey the swamp\" to precise calculations: what route length is needed to representatively cover each habitat type, and where to optimally lay it considering the road network."
    - type: result
      title: "Result"
      content: "Not just a \"territory visit plan\" was created, but an optimized research model: Resource savings: Clear understanding of required work volume allowed avoiding unnecessary trips and focusing efforts on key points — for example, swamp islands important for nesting. Data quality: Guaranteed coverage of at least 25% of each biotope area ensured representativeness and inventory completeness. Universal tool: The developed methodology, algorithms, and scripts were formalized. Now they can be applied for planning any animal counts, ecosystem monitoring, or recreational load assessment."
    - type: appeal
      title: "Message to Target Audience"
      content: "This case proves to protected areas, scientific departments, and land users that modern GIS technologies solve not theoretical but purely practical tasks. If you need to plan monitoring, inventory, or assess land condition over a large territory, our approach will turn chaotic data collection into a managed, effective, and scientifically-based process with measurable results and cost savings."
    - type: additional
      title: "Additional"
      links:
        - url: "/pdfs/ymike.ru_case_4.1.pdf"
          text: "doc: ymike.ru_case_4.1.pdf"
          type: "pdf"

- id: kejs-4-2
  title: "Forest Research: How a Custom App Simplified Field Research for a GIS Project"
  image: "/assets/images/cases/ymike.ru_c_4.2-1200w.webp"
  sections:
    - type: challenge
      title: "Challenge"
      content: "Starting a comprehensive GIS project on Remdovsky reserve habitat analysis, I wanted from the start to avoid classic field research mistakes: mountains of paper questionnaires, heaps of scattered files with photos and GPS tracks, and subsequent weeks of manual processing. The task was not to create chaos and not waste time. A tool was needed that would allow immediately collecting structured, georeferenced data ready for analysis in QGIS."
    - type: solution
      title: "Solution"
      content: "I designed and independently developed the Forest Research Android app on Kotlin. This is not a universal product, but a precise, \"tailored\" tool for specific project needs. It works offline, automatically records coordinates, attaches photos to points, and saves everything in GeoJSON format that can be directly uploaded to QGIS without any conversions. The app became a digital continuation of the field research methodology."
    - type: result
      title: "Result"
      content: "Field work became effective and error-free from day one: Instant data readiness: All expedition information was immediately structured and ready for spatial analysis. The manual data entry and conversion stage was eliminated. Hypothesis testing: The project confirmed that even a small specialized app can radically simplify workflow and improve data quality. Ready prototype: The created code and architecture became the basis for demonstrating the digitalization approach."
    - type: appeal
      title: "Message to Target Audience"
      content: "This case is a clear example of a flexible approach to digitalization. Protected areas, forestry departments, hunting farms — everyone working \"in the field\" faces specific tasks. Ready-made systems like SMART don't always fit, and universal solutions are too complex and expensive. I demonstrate that the optimal solution is often creating or deeply adapting a tool for your specific task. If you have a unique accounting or monitoring process, we can develop an equally effective and simple solution for it."
    - type: additional
      title: "Additional"
      links:
        - url: "/pdfs/ymike.ru_case_4.2.pdf"
          text: "doc: ymike.ru_case_4.2.pdf"
          type: "pdf"
        - url: "/pdfs/ymike.ru_case_4.2-1.pdf"
          text: "doc: ymike.ru_case_4.2-1.pdf"
          type: "pdf"

- id: kejs-5-1
  title: "From Specialist to Leader: How a 9-Month Program Taught Protected Area Staff to Create Projects at the Intersection of Ecology and Sociology"
  image: "/assets/images/cases/ymike.ru_c_5.1-1200w.webp"
  sections:
    - type: challenge
      title: "Challenge"
      content: "Protected area staff are excellent biologists and conservationists, but their projects often fail when facing the \"human factor.\" Tourism planning, community work, partner attraction — all this requires understanding of sociology and marketing, which are traditionally ignored in the reserve system. This created a gap between good intentions and their implementation, dooming many initiatives to failure."
    - type: solution
      title: "Solution"
      content: "As a co-author and instructor, I participated in creating a unique 9-month program for specialists from Russian protected areas (from Bryansk region to Primorye). Its philosophy: sustainability is born at the intersection of ecology and sociology. We led participants through a full cycle — from idea to ready grant application, combining lectures, practice, and internship in Kyrgyzstan. Key focus — teach creating projects where nature care and people's well-being reinforce each other, creating synergy."
    - type: result
      title: "Result"
      content: "The main outcome — approach transformation. Participants stopped being just specialists in their narrow field and became project managers capable of seeing systemic connections. At the output, 10 ready, developed projects were created, each having a chance to really improve conservation and social situation on their territory. These are 10 growth points for systematic work with territories."
    - type: appeal
      title: "Message to Target Audience"
      content: "This case is a model for anyone whose work is related to territory management and interaction with local population. For protected areas and NGOs — this is a path to creating truly sustainable initiatives. For regional authorities and corporations (especially with ESG agenda) — proof that investments in comprehensive projects where ecology and sociology are allies give maximum return and long-term effect. True leadership is formed through such a project approach."

- id: kejs-5-2
  title: "Rapid Immersion: How We Synchronized the Roszapovedcenter Team in 4 Days"
  image: "/assets/images/cases/ymike.ru_c_5.2-1200w.webp"
  sections:
    - type: challenge
      title: "Challenge"
      content: "Roszapovedcenter — a key institution coordinating federal protected areas — faced the task of quickly upskilling employees with different experience levels and synchronizing understanding of current trends in natural territory management and sustainable tourism development. It was required to give the team practical knowledge and common vision in a short time without long absence from work."
    - type: solution
      title: "Solution"
      content: "I developed and conducted an intensive 4-day course with a visit to the client's office. The \"immersion\" format allowed focusing on the most important: from basics of natural territory management to modern approaches to sustainable tourism development. This created a live dialogue and allowed combining theory with practice, giving answers to deep questions right during the learning process."
    - type: result
      title: "Result"
      content: "The program created a unique environment for professional communication and team synchronization. Participants received concentrated, structured knowledge and, more importantly, a unified conceptual language for discussing tasks. Emotional engagement and depth of topic development showed that even a short but properly planned intensive can give a powerful impulse for understanding real processes in territories."
    - type: appeal
      title: "Message to Target Audience"
      content: "This case demonstrates the flexibility and practicality of my approach. If your organization — whether a government institution, corporate training center, or tourism business association — needs to quickly and effectively \"upgrade\" the team on specific topics, I can develop and conduct a focused program, gathering an optimal pool of experts and adapting content to your unique tasks."

- id: kejs-5-3
  title: "Adapting Global Experience: International Course for Russian Protected Area Staff"
  image: "/assets/images/cases/ymike.ru_c_5.3-1200w.webp"
  sections:
    - type: challenge
      title: "Challenge"
      content: "Specialists of Russian reserves and national parks often found themselves at a dead end when solving conflicts with local communities, developing tourism, or changing people's behavior. There was a lack of systemic knowledge and tools beyond biology and jurisprudence. The industry needed a new, \"human\" dimension for work."
    - type: solution
      title: "Solution"
      content: "I served as a co-instructor in a 40-hour international course \"Social Aspects of Nature Conservation and Communication (Human Dimension in Conservation),\" organized by ANO OSDJ and Sikhote-Alin Reserve. My key role was adaptation — I was a \"translator\" between the advanced methodology of leading world expert Heidi Kretser and Russian reality. I not only translated materials but also selected cases understandable for our audience, explained complex concepts, and helped apply theoretical models to specific situations in Russian protected areas."
    - type: result
      title: "Result"
      content: "30 protected area staff from different parts of Russia gained access to modern methods of working with society in the context of nature conservation. The main outcome was a mindset shift: participants saw in eternal conflicts not just confrontation, but systemic socio-economic problems that can be analyzed and solved using scientific methods. The course laid foundations for more professional and effective interaction with people."
    - type: appeal
      title: "Message to Target Audience"
      content: "This case is direct evidence of world-class expertise. For universities and corporate training centers, it confirms that I am capable not only of knowing but also effectively transmitting the most advanced international practices in sustainable development and ESG, adapting them to local context. For federal protected areas and conservation NGOs — this is a guarantee that training with me will meet the highest professional standards."

- id: kejs-5-4
  title: "Team Transformation: How to Unite a Team and Restore Meaning to Work in One Month"
  image: "/assets/images/cases/ymike.ru_c_5.4-1200w.webp"
  sections:
    - type: challenge
      title: "Challenge"
      content: "After restructuring in the St. Petersburg Natural Territories Directorate, a young team of strong but disconnected specialists was formed. Contradictions between nature conservation and tourism development tasks were subjects of discussions and even disputes."
    - type: solution
      title: "Solution"
      content: "I conducted an intensive month-long team development program. Instead of lectures — live sessions where participants found answers themselves. Through dialogue seminars, we overcame skepticism and found common language. During trainings, the team formulated their values and mission. During the strategic session — defined priorities. During planning — turned ideas into a concrete plan with tasks, deadlines, and responsible parties. My role was facilitation: I created the process, guided discussion, and helped structure thoughts."
    - type: result
      title: "Result"
      content: "In one month, a real team with shared vision and values was formed. The key conflict \"conservation vs. development\" was resolved — employees found balance themselves. Motivation grew, burnout risks decreased, as everyone saw their contribution to the common cause. The plan stopped being a formality and became a guide to action."
    - type: appeal
      title: "Message to Target Audience"
      content: "This case is an example of how targeted team development can quickly overcome disconnection, restore meaning to work, and increase effectiveness. If your team \"burns\" not with enthusiasm but with stress, if there's no clarity and common goals — I will help you go through this path and become a cohesive team that achieves results."
