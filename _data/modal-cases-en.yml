- id: kejs-1-1
  title: "Ministry of Natural Resources and Protected Areas: Common Ground Found"
  image: "/assets/images/cases/ymike.ru_c_1.1-1200w.webp"
  sections:
    - type: challenge
      title: "Challenge"
      content: "Two key groups determining the development of the protected area system — representatives of the Russian Ministry of Natural Resources and Roszapovedcenter on one side, and field practitioners (protected area directors) on the other — had different views on priorities and the industry's future. This created hidden tension and hindered development of a unified course."
    - type: solution
      title: "Solution"
      content: "I designed and conducted an intensive one-day session, bringing together over 20 managers of different levels in one working group. Using my original methodology, I organized a process where each side could hear the other's arguments and jointly seek solutions rather than defend their positions."
    - type: result
      title: "Result"
      content: "The main outcome was not just holding a meeting, but overcoming disagreements and formulating ten key development directions for the entire protected area system, such as \"Effective State Management,\" \"Tourism as a Nature Conservation Tool,\" \"Significant Socio-Economic Role of Protected Areas.\" These directions became the foundation for further joint work."
    - type: appeal
      title: "Message to Target Audience"
      content: "This case is a clear example of how my methodology helps overcome bureaucratic deadlock and align positions between central government bodies and territorial units. The approach is applicable in any field requiring development of a unified strategic agenda despite different views on priorities."

- id: kejs-1-2
  title: "Three Years of Support: How Shorsky National Park Moves Toward Its Goal Despite Constraints"
  image: "/assets/images/cases/ymike.ru_c_1.2-1200w.webp"
  sections:
    - type: challenge
      title: "Challenge"
      content: "The national park team faced industry-typical problems: low motivation due to salary levels; disconnected specialists and lack of clear understanding of development prospects amid numerous challenges and objective constraints. The risk of professional burnout and loss of work meaning was high."
    - type: solution
      title: "Solution"
      content: "Instead of a one-time session, I proposed a long-term partnership model: \"initialization + annual development spiral.\" We started with deep team engagement to jointly create a strategy and plan. Then moved to an annual cycle: reviewing results, adjusting directions, and planning for the next year. My role — facilitator and \"external conscience,\" helping the team see not only constraints but also achieved successes."
    - type: result
      title: "Result"
      content: "The main result — sustainable, systematic progress under very limited resources. For the third year, the team has an up-to-date strategy and clear plan that reminds them of work meaning and prevents drowning in routine. This is a tool for maintaining motivation and professional resilience in difficult situations."
    - type: appeal
      title: "Message to Target Audience"
      content: "This case proves that even with strict budget and staffing constraints, progressive development is possible. If your organization or regional project is \"stalling\" due to lack of resources and loss of team spirit — this methodology will launch a process of managed, meaningful movement toward the goal."

- id: kejs-1-3
  title: "ANO \"OSDJ\": How to Align Opposing Views on an NGO's Future"
  image: "/assets/images/cases/ymike.ru_c_1.3-1200w.webp"
  sections:
    - type: challenge
      title: "Challenge"
      content: "An expert conservation NGO working in the Far East faced internal disagreements on key strategic issues: from PR role to geographic priorities. Different views of founders, scientists, and specialists hindered formulation of a unified development vector, creating risk of scattered efforts and resources."
    - type: solution
      title: "Solution"
      content: "A pure facilitation methodology was applied to solve this. I conducted an original strategic session specifically focused on thorough development of vision and root problems. My role was organizing constructive dialogue that allowed all parties to hear each other and identify common ground without imposing ready-made solutions."
    - type: result
      title: "Result"
      content: "During the session, initial contradictions were overcome and a common development strategy was developed, agreed upon by all key participants — from founders to research staff. This created a solid foundation for coordinated work, clear for both the internal team and external donors."
    - type: appeal
      title: "Message to Target Audience"
      content: "This case shows how professional facilitation can structure even the most expert but scattered initiative into a clear, manageable project. The methodology proves effective for any organizations — NGOs, foundations, or corporate departments — where consensus needs to be found and different opinions turned into an agreed action plan."

- id: kejs-2-1
  title: "Crisis Diagnostics: Sociological Study of the Tourism Boom in Teriberka"
  image: "/assets/images/cases/ymike.ru_c_2.1-1200w.webp"
  sections:
    - type: challenge
      title: "Challenge"
      content: "Teriberka village became a victim of its own popularity. A spontaneous tourism boom, fueled by social media and the opportunity to see whales, led to a systemic crisis: catastrophic load on fragile Arctic nature (trash, stress for whales) and deep social division. Local residents not involved in tourism economy suffered from rising prices, infrastructure degradation, and loss of control over their lives. There was understanding of problems, but no objective picture and clear action plan."
    - type: solution
      title: "Solution"
      content: "We conducted a comprehensive analysis including in-depth interviews with key stakeholders. My task as a practicing sociologist — identify not only symptoms but root causes. The study clearly showed the gap between \"tourism as a product\" (striking photos for social media) and \"tourism as life\" (deteriorating quality of life for locals). Based on this analysis, we developed a detailed plan of practical measures aimed at: 1. Nature protection: implementing scientifically-based whale watching rules, creating eco-trails, strengthening control. 2. Community support: mechanisms for involving residents in tourism economy, creating a \"roadmap\" for local business, projects for preserving village identity."
    - type: result
      title: "Result"
      content: "The study provided the client not just with problem statement, but an objective basis for management decisions. A detailed \"roadmap\" was formed with concrete steps for government, protected areas, and business to transition from spontaneous development to managed sustainable development. The work showed that even in deep crisis situations, transition from diagnostics to constructive actions is possible."
    - type: appeal
      title: "Message to Target Audience"
      content: "Of course, it's always easier to prevent than to fix. But even in such complex situations, a scientific approach combined with practical experience allows developing a clear, justified action plan. This case proves: competent diagnostics of public opinion and social context — the first and main step toward ecosystem conservation and creating a sustainable local economy."
    - type: additional
      title: "Additional"
      links:
        - url: "/pdfs/ymike.ru_case_2.1.pdf"
          text: "Doc: ymike.ru_case_2.1.pdf"
          type: "pdf"

- id: kejs-2-2
  title: "Losiny Ostrov: How to Change Image and Establish Management for a Protected Area in a Megacity"
  image: "/assets/images/cases/ymike.ru_c_2.2-1200w.webp"
  sections:
    - type: challenge
      title: "Challenge"
      content: "After part of \"Losiny Ostrov\" National Park was transferred to Moscow's management, the territory faced an identity and management crisis. In public opinion, it was perceived only as a leisure place, not a valuable protected area. 40% of media mentions were negative, forming an image of a problematic place. The new management team had to work under deep distrust from activists, local residents, and business; there were no unified communication channels and coordination."
    - type: solution
      title: "Solution"
      content: "Our team conducted a comprehensive analysis: media research (over 500 publications) and audience segmentation. The key was a scientific approach: we built a stakeholder matrix, identifying 15 target groups — from local activists to regional business. For each group, their interests, preferred communication channels, and key messages were defined. The strategy changed paradigm: instead of reacting to crisis — systematic work with each audience, transitioning them from opponent status to partner status."
    - type: result
      title: "Result"
      content: "A holistic 3-year transformation roadmap was created. It included concrete tools: from creating a public control platform and \"park friends business club\" to staff training and new information policy. The client received a clear, data-based plan for changing the park's image, creating a unified communication system, and transitioning from confrontation to cooperation."
    - type: appeal
      title: "Message to Target Audience"
      content: "This case is a guide to action for any organization whose work is under public attention and faces criticism. If your organization's reputation — whether a protected area, museum, or resource company — suffers from spontaneous negativity and misunderstanding, our approach gives you a system. We show how to turn public relations chaos into a managed process where each audience becomes an ally."
    - type: additional
      title: "Additional"
      links:
        - url: "/pdfs/ymike.ru_case_2.2.pdf"
          text: "Doc: ymike.ru_case_2.2.pdf"
          type: "pdf"

- id: kejs-2-3
  title: "How to Measure the Impact of a Reserve Visit: One of Russia's First Studies on the Conservation Effect of Protected Area Visits"
  image: "/assets/images/cases/ymike.ru_c_2.3-1200w.webp"
  sections:
    - type: challenge
      title: "Challenge"
      content: "Sikhote-Alin Biosphere Reserve, having developed tourism, lacked objective data about its visitors. Management couldn't answer key questions: Who comes and what do they expect? How does tourism affect people's attitudes toward nature conservation? Without this knowledge, it was impossible to strategically manage the flow, improve services, and most importantly — evaluate how well tourism fulfills the reserve's mission of building public support."
    - type: solution
      title: "Solution"
      content: "The first targeted study in Russian practice was conducted, specifically aimed at measuring conservation effect. Through anonymous visitor surveys, we collected data not only on service satisfaction but also on changes in their environmental attitudes. The methodology allowed translating the abstract goal \"to educate\" into measurable indicators: understanding of protected area mission, willingness for personal contribution, behavior change."
    - type: result
      title: "Result"
      content: "The study gave a clear picture. Strengths were identified: 94% of visitors justify the reserve's strict regime, 100% are ready to support it. The key was accurate diagnosis of weaknesses: only 29% understand what the reserve does, and only 28% see their personal contribution. This allowed formulating not general wishes, but targeted recommendations: strengthen conservation content in excursions, develop programs for different groups, create an effect monitoring system."
    - type: appeal
      title: "Message to Target Audience"
      content: "For conservationists, this case proves that tourism can and should be measured not only economically, but also in terms of mission fulfillment. This is a tool for turning spontaneous flow into a strategic support resource. For regional authorities and business (including tour operators) — an example of how objective data about audience demand and perception becomes the basis for effective investments and development of sustainable, socially responsible tourism."
    - type: additional
      title: "Additional"
      links:
        - url: "/pdfs/ymike.ru_case_2.3.pdf"
          text: "Doc: ymike.ru_case_2.3.pdf"
          type: "pdf"

- id: kejs-3-1
  title: "Gateway to Wild Kamchatka: How an Urban Visitor Center Became the Communication Hub for a Reserve and Tourism Business"
  image: "/assets/images/cases/ymike.ru_c_3.1-1200w.webp"
  sections:
    - type: challenge
      title: "Challenge"
      content: "Kronotsky Reserve, a World Heritage site, remained \"invisible\" to many. Local residents poorly understood its role, and tourists coming for spectacles (volcanoes, geysers, bears) perceived the territory only as a natural attraction. They didn't see the enormous conservation work that staff perform daily. The reserve missed a key opportunity to build public support and convey its mission to the main audience — Kamchatka guests."
    - type: solution
      title: "Solution"
      content: "I developed a visitor center concept, making it not just a museum, but intellectual \"gates\" to the territory. Its core was not the popular \"big seven\" attractions, but the theme of territorial nature conservation. Through a modern exposition (two-level stands, interactives, immersion zones), I showed how and why Kamchatka's fragile nature is conserved. The center became a logical and useful element for tourist flow: here, groups whose helicopter flights were delayed due to weather didn't lose time but immersed themselves in context, preparing for responsible territory visits."
    - type: result
      title: "Result"
      content: "A powerful tool emerged, solving several tasks simultaneously: For the reserve: Strengthening image and forming mission understanding among a wide audience. Staff work became visible and valued. For tourists: Deep educational immersion, turning a trip from \"photo hunting\" into a meaningful journey. For tourism business: Solving a logistical problem. The center became a legal gathering point, comfortable waiting zone, and stage of quality client preparation, increasing the entire tour's value."
    - type: appeal
      title: "Message to Target Audience"
      content: "This case is a model for any territory or region whose value is reduced by visitors only to \"postcard views.\" If you want tourists to see in your destination not just a selfie background, but a living system requiring conservation — such a visitor center becomes a key investment. It transforms perception, creates loyalty, and offers a ready solution for tour operators, integrating their business into the conservation agenda."
    - type: additional
      title: "Additional"
      links:
        - url: "/pdfs/ymike.ru_case_3.1.pdf"
          text: "doc: ymike.ru_case_3.1.pdf"
