<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta name="author" content="{{ site.author }}">

<!-- Favicon -->
<link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">

<!-- Google Fonts: Lato -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

<!-- Мгновенное скрытие страницы при восстановлении позиции прокрутки (убирает мелькание) -->
<script>
if (sessionStorage.getItem('langSwitchScrollPct') !== null) {
  document.documentElement.style.visibility = 'hidden';
}
if ('scrollRestoration' in history) {
  history.scrollRestoration = 'manual';
}
</script>

<!-- Главный CSS -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<!-- Модальное окно CSS -->
<link rel="stylesheet" href="{{ '/assets/css/modal.css' | relative_url }}">

<!-- SEO плагин Jekyll -->
{% seo %}

<!-- hreflang для двуязычного сайта -->
{% if page.url contains '/en/' %}
  {% assign ru_url = page.url | remove: '/en' %}
  <link rel="alternate" hreflang="ru" href="{{ site.url }}{{ ru_url }}" />
  <link rel="alternate" hreflang="en" href="{{ site.url }}{{ page.url }}" />
  <link rel="alternate" hreflang="x-default" href="{{ site.url }}{{ ru_url }}" />
{% else %}
  {% assign en_url = '/en' | append: page.url %}
  <link rel="alternate" hreflang="ru" href="{{ site.url }}{{ page.url }}" />
  <link rel="alternate" hreflang="en" href="{{ site.url }}{{ en_url }}" />
  <link rel="alternate" hreflang="x-default" href="{{ site.url }}{{ page.url }}" />
{% endif %}

{% if site.metrika_id and site.metrika_id != "" %}
<!-- Yandex.Metrika counter -->
<script type="text/javascript">
  (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
  m[i].l=1*new Date();k=e.createElement(t),a=e.getElementsByTagName(t)[0];
  k.async=1;k.src=r;a.parentNode.insertBefore(k,a)})
  (window, document, "script", "https://mc.yandex.ru/metrika/tag.js", "ym");

  ym({{ site.metrika_id }}, "init", {
       clickmap:true,
       trackLinks:true,
       accurateTrackBounce:true,
       webvisor:true
  });
</script>
<noscript><div><img src="https://mc.yandex.ru/watch/{{ site.metrika_id }}" style="position:absolute; left:-9999px;" alt="" /></div></noscript>
<!-- /Yandex.Metrika counter -->
{% endif %}
