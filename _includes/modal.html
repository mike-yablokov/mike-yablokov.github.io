<!-- Модальное окно для кейсов -->
<div id="modal-overlay" class="modal-overlay" style="display: none;">
  <div class="modal-container">
    <div class="modal-header">
      <button class="modal-close" aria-label="{% if page.url contains '/en/' %}Close{% else %}Закрыть{% endif %}">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="modal-content" id="modal-content">
      <!-- Контент загружается динамически -->
    </div>
  </div>
</div>

<!-- Передача данных кейсов в JavaScript -->
<script>
  window.modalCasesData = {
    {% if page.url contains '/en/' %}
      {% for case in site.data['modal-cases-en'] %}
      '{{ case.id }}': {{ case | jsonify }}{% unless forloop.last %},{% endunless %}
      {% endfor %}
    {% else %}
      {% for case in site.data['modal-cases'] %}
      '{{ case.id }}': {{ case | jsonify }}{% unless forloop.last %},{% endunless %}
      {% endfor %}
    {% endif %}
  };
  window.currentLang = "{% if page.url contains '/en/' %}en{% else %}ru{% endif %}";
</script>
